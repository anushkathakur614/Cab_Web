<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Page</title>

    <link rel="stylesheet" href="CSS_files/style.css">
    <link rel="stylesheet" href="CSS_files/responsive.css">
</head>
<body>

    <!-- Back Button -->
    <div class="back-btn">
        <a href="home.html">⬅ Back to Home</a>
    </div>

    <section class="feedback-section">

        <div class="feedback-card">

            <h2>⭐ Customer Feedback</h2>
            <p>We value your feedback! Please share your experience with us.</p>

            <!-- Star Rating -->
            <div class="rating">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>

            <!-- Name -->
            <div class="input-group">
                <label>Your Name</label>
                <input type="text"
                       id="feedbackName"
                       readonly>
            </div>

            <!-- Feedback -->
            <div class="input-group">
                <label>Your Feedback</label>

                <textarea
                    id="feedbackMessage"
                    rows="5"
                    placeholder="Write your feedback here..."></textarea>
            </div>

            <!-- Emoji -->
            <div class="emoji-box">

                <p>Select Your Mood</p>

                <span class="emoji" data-value="😡">😡</span>
                <span class="emoji" data-value="😕">😕</span>
                <span class="emoji" data-value="😐">😐</span>
                <span class="emoji" data-value="🙂">🙂</span>
                <span class="emoji" data-value="😍">😍</span>

            </div>

            <!-- Submit -->
            <button id="submitFeedback">
                Submit Feedback
            </button>

            <!-- Success Message -->
            <p id="successMsg"></p>

        </div>

    </section>

    <script src="javaScript_files/feedback.js"></script>

</body>
</html>
