<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="../CSS_files/style.css">
    <link rel="stylesheet" href="../CSS_files/responsive.css">
</head>
<body>
    <section class="login-section">
        <div class="login-left">
            <h1>Welcome Back!</h1>
            <p>Login to access your booking and manage your rides.</p>
        </div>
        <div class="login-box">
            <h2>Login Account</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Enter registered email" required>
                <input type="password" id="loginPassword" placeholder="Enter Password" required>
                <button type="submit">Login</button>
                
            </form>
            <p class="register-link">
                Don't have an account?
                <a href="register.html">Register Here</a>
            </p>
        </div>
    </section>
    <script src="../javaScript_files/auth.js"></script>
</body>
</html>
