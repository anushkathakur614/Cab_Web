<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Profile</title>
    <link rel="stylesheet" href="../CSS_files/style.css">
    <link rel ="stylesheet" href="../CSS_files/responsive.css">
</head>
<body>
    <section class="profile-page">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <h1 id="profileName">User Name</h1>
                <p class="welcome">Welcome to YourCab</p>
            </div>

            <div class="profile-details">
                <div class="detail">
                    <span class="label">📧 Email</span>
                    <span id="profileEmail"> email@gmail.com</span>
                </div>
                <div class="detail">
                    <span class="label">📱 Phone</span>
                    <span id="profilePhone">1000000000</span>
                </div>
                <div class="detail">
                    <span class="label">🚕 Total Bookings</span>
                    <span id="totalBookings">0</span>
                </div>
            </div>

            <div class="profile-buttons">
                <button id="editBtn">✏️ Edit Profile</button>
                <button id="changePassBtn">🔒 Change Password</button>
            </div>
            <a href="HTML_Files/home.html">
                <button class="home-btn">🏡 Back to Home</button>
            </a>
        </div>
    </section>
    <script src="../javaScript_files/profile.js"></script>
    
</body>
</html>
